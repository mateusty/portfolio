<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="./script.js" defer></script>
    <link rel="stylesheet" href="./style.css">
    <title>Portfolio</title>
    <!-- Carrega a preferência de tema do usuário -->
    
    <script>
            const isDark = localStorage.getItem('isDark') === 'true';
            const root = document.documentElement;

            if (isDark) {
                root.style.setProperty('--shade-1', '#141414')
                root.style.setProperty('--shade-2', '#444444')
                root.style.setProperty('--shade-3', '#979797')
                root.style.setProperty('--shade-4', '#d6d6d6')
            } else {
                root.style.setProperty('--shade-1', '#d6d6d6')
                root.style.setProperty('--shade-2', '#979797')
                root.style.setProperty('--shade-3', '#444444')
                root.style.setProperty('--shade-4', '#141414')
            }
    </script>
</head>

<body>

    <div class="introducao">
        <h1 id="ola">👋 Hello</h1>
    </div>

    <main class="introducao-main">
        <button onclick="toggleLightMode()" class="autoShow fast toggleMode"></button>

        <nav class="nav">
            <a href="#1"></a>
            <a href="#2"></a>
            <a href="#3"></a>
        </nav>
        
        <section class="inicio" id="1">
            <div class="text-intro">
                <h1 class="autoShow fast">
                    Sou <span class="highlight-text">Mateus Tamaki</span>,
                </h1>
                <h3 class="autoShow medium">
                    Desenvolvedor Full-Stack
                </h3>
                <div class="links">   <a href="https://github.com/mateusty" target="_blank" id="github" class="autoShow slow"></a> 
                                                    <a href="https://www.linkedin.com/in/mateus-tamaki-b5826936a/" target="_blank" id="linkedin" class="autoShow slow"></a> 
                                                    <a href="mailto:mateustamaki43@gmail.com" id="email" class="autoShow slow"></a></div>
            </div>

            <img src="./assets/picture-temp.png" alt="Foto" class="autoShow medium picture">
        </section>

        <section class="meio" id="2">
        </section>
            
        <section class="fim" id="3">
        </section>
    </main>
</body>
</html>
